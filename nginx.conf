server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    default_type text/plain;
    return 200 'ok';
  }

  location /x/btc/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host mempool.space;
    proxy_pass https://mempool.space/api/;
  }

  location /x/ltc/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host litecoinspace.org;
    proxy_pass https://litecoinspace.org/api/;
  }

  location /x/blockchair/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.blockchair.com;
    proxy_pass https://api.blockchair.com/;
  }

  location /x/zec/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.mainnet.cipherscan.app;
    proxy_pass https://api.mainnet.cipherscan.app/;
  }

  location /x/tron/ {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.trongrid.io;
    proxy_pass https://api.trongrid.io/;
  }

  location = /x/rpc/eth {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host ethereum.publicnode.com;
    proxy_pass https://ethereum.publicnode.com/;
  }

  location = /x/rpc/bsc {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host bsc-dataseed.binance.org;
    proxy_pass https://bsc-dataseed.binance.org/;
  }

  location = /x/rpc/polygon {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host polygon-bor.publicnode.com;
    proxy_pass https://polygon-bor.publicnode.com/;
  }

  location = /x/rpc/arb {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host arbitrum-one.publicnode.com;
    proxy_pass https://arbitrum-one.publicnode.com/;
  }

  location = /x/rpc/op {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host optimism.publicnode.com;
    proxy_pass https://optimism.publicnode.com/;
  }

  location = /x/rpc/base {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host base.publicnode.com;
    proxy_pass https://base.publicnode.com/;
  }

  location = /x/rpc/avax {
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host avalanche-c-chain-rpc.publicnode.com;
    proxy_pass https://avalanche-c-chain-rpc.publicnode.com/;
  }

  gzip on;
  gzip_types text/css application/javascript application/json;
}
